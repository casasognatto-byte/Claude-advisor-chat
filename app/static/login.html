<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sogno · Entrar</title>
<link rel="stylesheet" href="/static/theme.css" />
<style>
  @font-face { font-family:'Benjamin'; src:url('/static/fonts/FSBenjamin-Light.otf') format('opentype'); font-weight:300; font-display:swap; }
  @font-face { font-family:'Benjamin'; src:url('/static/fonts/FSBenjamin-Regular.otf') format('opentype'); font-weight:400; font-display:swap; }
  @font-face { font-family:'Sackers'; src:url('/static/fonts/SackersGothic-Medium.otf') format('opentype'); font-display:swap; }

  :root {
    --green-900: #121212;
    --green-800: #1c1c1c;
    --green-700: #262626;
    --cream: #f0ede6;
    --muted: #a3a09a;
    --gold: #c9975a;
    --gold-soft: #dcb17e;
    --border: rgba(255,255,255,.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; overflow: hidden;
    font-family: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
    background: radial-gradient(1200px 700px at 50% -15%, #201812 0%, var(--green-800) 55%, var(--green-900) 100%);
    color: var(--cream);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  /* marca d'água gigante ao fundo */
  .watermark {
    position: fixed; right: -4vw; bottom: -14vh; pointer-events: none;
    font-family: 'Benjamin'; font-weight: 400; font-size: 52vh;
    color: #ffffff; opacity: .03; line-height: .8; user-select: none;
  }
  .card {
    position: relative; z-index: 1; width: 100%; max-width: 380px;
    background: rgba(23,23,23,.55); border: 1px solid var(--border);
    border-radius: 16px; padding: 36px 30px; backdrop-filter: blur(20px);
    box-shadow: 0 24px 70px rgba(0,0,0,.45);
  }
  .wm { text-align: center; margin-bottom: 30px; }
  .wm .casa {
    font-family: 'Sackers'; font-size: 12px; letter-spacing: .5em;
    color: var(--cream); padding-left: .5em;
  }
  .wm .sognatto {
    font-family: 'Benjamin'; font-weight: 400; font-size: 34px;
    letter-spacing: .05em; color: var(--cream); margin-top: 2px; line-height: 1;
  }
  .wm .sognatto sup { font-size: 11px; color: var(--gold); top: -1.1em; }
  .wm .key { margin: 10px auto 8px; color: var(--gold); }
  .wm .tag {
    font-family: 'Sackers'; font-size: 7.5px; letter-spacing: .28em;
    color: var(--gold); text-transform: uppercase;
  }
  label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; letter-spacing: .02em; }
  input {
    width: 100%; background: rgba(15,33,20,.6); color: var(--cream);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 11px 12px; font: inherit; font-size: 15px;
  }
  input:focus { outline: none; border-color: var(--gold); }
  .pw-field { position: relative; }
  .pw-field input { width: 100%; padding-right: 40px; }
  .pw-toggle {
    position: absolute; top: 50%; right: 4px; transform: translateY(-50%);
    width: auto; margin: 0; padding: 6px; background: none; border: none;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); cursor: pointer;
  }
  .pw-toggle:hover { background: none; color: var(--gold); }
  .pw-toggle svg { width: 18px; height: 18px; display: block; }
  .pw-toggle .icon-eye-off { display: none; }
  .pw-toggle.active .icon-eye { display: none; }
  .pw-toggle.active .icon-eye-off { display: block; }
  button {
    width: 100%; margin-top: 22px; padding: 12px;
    background: var(--gold); color: #1c1408; border: none;
    border-radius: 10px; font-family: 'Sackers'; font-size: 12px;
    letter-spacing: .18em; text-transform: uppercase; cursor: pointer;
  }
  button:hover { background: var(--gold-soft); }
  button:disabled { opacity: .6; cursor: default; }
  .error { margin-top: 14px; font-size: 13px; color: #ff9d9d; text-align: center; min-height: 18px; }
  .forgot { display: block; text-align: center; margin-top: 16px; font-size: 12.5px; color: var(--muted); text-decoration: none; }
  .forgot:hover { color: var(--gold); }
</style>
</head>
<body>
  <div class="watermark">S</div>
  <div class="card">
    <div class="wm">
      <img src="/static/logo.png" alt="" style="max-height:64px;max-width:220px;margin-bottom:8px;display:none" onload="this.style.display='block';document.getElementById('txtlogo').style.display='none'" />
      <div id="txtlogo">
        <div class="casa">CASA</div>
        <div class="sognatto">SOGNATTO<sup>®</sup></div>
        <svg class="key" width="28" height="49" viewBox="0 0 113.386 198.425" fill="currentColor">
          <path transform="matrix(1,0,0,-1,23.6487,60.9236)" d="M0 0C.003 3.482 1.398 6.591 3.677 8.878 5.964 11.157 9.073 12.553 12.555 12.555 16.037 12.553 19.146 11.157 21.433 8.878 23.712 6.591 25.108 3.482 25.111 0 25.108-3.482 23.712-6.591 21.433-8.878 19.146-11.157 16.037-12.553 12.555-12.555 9.073-12.553 5.964-11.157 3.677-8.878 1.398-6.591 .003-3.482 0 0M23.042-25.931 24.437-17.806 33.103-13.01 41.77-17.806 43.165-25.931 36.282-27.25 35.548-21.027H30.659L29.926-27.25ZM30.391-34.318H35.816L34.812-39.009H31.395ZM41.097 0C41.1 3.482 42.495 6.591 44.775 8.878 47.062 11.157 50.17 12.553 53.652 12.555 57.134 12.553 60.243 11.157 62.53 8.878 64.809 6.591 66.205 3.482 66.208 0 66.205-3.482 64.809-6.591 62.53-8.878 60.243-11.157 57.134-12.553 53.652-12.555 50.17-12.553 47.062-11.157 44.775-8.878 42.495-6.591 41.1-3.482 41.097 0M44.089 26.349C44.087 23.3 42.867 20.583 40.872 18.581 38.869 16.585 36.152 15.365 33.103 15.363 30.055 15.365 27.339 16.585 25.336 18.581 23.34 20.584 22.12 23.3 22.118 26.349 22.12 29.397 23.34 32.114 25.336 34.117 27.339 36.112 30.055 37.332 33.103 37.334 36.152 37.332 38.869 36.112 40.872 34.117 42.867 32.114 44.087 29.397 44.089 26.349M-9.416 0C-9.419-6.052-6.95-11.575-2.981-15.536 .98-19.505 6.503-21.974 12.555-21.971 13.45-21.972 14.327-21.897 15.195-21.789V-30.352C15.197-30.352 26.662-31.45 22.805-42.632 22.649-43.082 22.887-43.556 23.334-43.717 24.822-44.253 27.693-46.01 27.693-51.578V-95.686H13.444V-104.493H18.76V-109.423H13.444V-118.23H27.693V-123.328H38.514V-51.578C38.514-45.996 41.399-44.245 42.884-43.713 43.328-43.554 43.565-43.086 43.416-42.638 39.709-31.497 51.012-30.352 51.012-30.352V-21.789C51.88-21.896 52.757-21.972 53.652-21.971 59.705-21.974 65.227-19.505 69.188-15.536 73.157-11.575 75.626-6.052 75.623 0 75.626 6.052 73.157 11.575 69.188 15.536 65.227 19.505 59.705 21.974 53.652 21.971L53.013 21.939C53.328 23.363 53.506 24.835 53.505 26.349 53.508 31.968 51.215 37.098 47.53 40.775 43.853 44.46 38.723 46.753 33.103 46.751 27.485 46.753 22.355 44.46 18.677 40.775 14.993 37.098 12.699 31.968 12.702 26.349 12.701 24.835 12.879 23.363 13.194 21.939 12.98 21.945 12.771 21.971 12.555 21.971 6.503 21.974 .98 19.505-2.981 15.536-6.95 11.575-9.419 6.052-9.416 0"/>
        </svg>
        <div class="tag">O luxo está no singular</div>
      </div>
    </div>

    <label for="user">E-mail</label>
    <input id="user" type="email" autocomplete="username" autofocus placeholder="voce@casasognatto.com.br" />
    <label for="pass">Senha</label>
    <div class="pw-field">
      <input id="pass" type="password" autocomplete="current-password" />
      <button type="button" class="pw-toggle" data-target="pass" aria-label="Mostrar senha">
        <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A9.13 9.13 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>
    <button id="btn">Entrar</button>
    <div class="error" id="err"></div>
    <a class="forgot" href="/forgot">Esqueci minha senha</a>
  </div>

<script>
  const user = document.getElementById("user");
  const pass = document.getElementById("pass");
  const btn = document.getElementById("btn");
  const err = document.getElementById("err");
  async function login() {
    err.textContent = ""; btn.disabled = true;
    try {
      const res = await fetch("/api/login", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: user.value, password: pass.value }),
      });
      if (res.ok) { window.location.href = "/"; }
      else {
        let msg = "Não foi possível entrar.";
        try { msg = (await res.json()).detail || msg; } catch (_) {}
        err.textContent = msg;
      }
    } catch (e) { err.textContent = "Erro de conexão. Tente novamente."; }
    finally { btn.disabled = false; }
  }
  btn.addEventListener("click", login);
  [user, pass].forEach((el) => el.addEventListener("keydown", (e) => { if (e.key === "Enter") login(); }));

  document.querySelectorAll(".pw-toggle").forEach((toggle) => {
    const input = document.getElementById(toggle.dataset.target);
    toggle.addEventListener("click", () => {
      const showing = input.type === "text";
      input.type = showing ? "password" : "text";
      toggle.classList.toggle("active", !showing);
      toggle.setAttribute("aria-label", showing ? "Mostrar senha" : "Ocultar senha");
    });
  });
</script>
</body>
</html>
