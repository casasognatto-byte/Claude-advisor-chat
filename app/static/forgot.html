<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Casa Sognatto · Recuperar acesso</title>
<style>
  @font-face { font-family:'Benjamin'; src:url('/static/fonts/FSBenjamin-Regular.otf') format('opentype'); font-weight:400; font-display:swap; }
  @font-face { font-family:'Sackers'; src:url('/static/fonts/SackersGothic-Medium.otf') format('opentype'); font-display:swap; }
  @font-face { font-family:'NeueMontreal'; src:url('/static/fonts/PPNeueMontreal.ttf') format('truetype'); font-display:swap; }
  :root { --green-800:#152C1C; --green-900:#0f2114; --cream:#ece9e1; --muted:#93a597; --gold:#c2a06a; --gold-soft:#d8bd8b; --border:#2a4434; }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; font-family:'NeueMontreal',system-ui,sans-serif; background:radial-gradient(1200px 700px at 50% -15%,#1c3a26 0%,var(--green-800) 55%,var(--green-900) 100%); color:var(--cream); display:flex; align-items:center; justify-content:center; padding:20px; }
  .card { width:100%; max-width:380px; background:rgba(29,58,39,.55); border:1px solid var(--border); border-radius:16px; padding:36px 30px; }
  .brand { text-align:center; margin-bottom:26px; }
  .brand .casa { font-family:'Sackers'; font-size:12px; letter-spacing:.5em; }
  .brand .sognatto { font-family:'Benjamin'; font-size:32px; }
  h1 { font-family:'Benjamin'; font-weight:400; font-size:18px; text-align:center; margin:0 0 6px; }
  p.sub { font-size:13px; color:var(--muted); text-align:center; margin:0 0 20px; line-height:1.5; }
  label { display:block; font-size:12px; color:var(--muted); margin:14px 0 6px; }
  input { width:100%; background:rgba(15,33,20,.6); color:var(--cream); border:1px solid var(--border); border-radius:10px; padding:11px 12px; font:inherit; font-size:15px; }
  input:focus { outline:none; border-color:var(--gold); }
  button { width:100%; margin-top:22px; padding:12px; background:var(--gold); color:#1c1408; border:none; border-radius:10px; font-family:'Sackers'; font-size:12px; letter-spacing:.18em; text-transform:uppercase; cursor:pointer; }
  button:hover { background:var(--gold-soft); } button:disabled { opacity:.6; }
  .msg { margin-top:16px; font-size:13px; text-align:center; min-height:18px; line-height:1.5; }
  .msg.ok { color:var(--gold-soft); } .msg.err { color:#ff9d9d; }
  a.back { display:block; text-align:center; margin-top:18px; font-size:12.5px; color:var(--muted); text-decoration:none; }
  a.back:hover { color:var(--gold); }
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><div class="casa">CASA</div><div class="sognatto">SOGNATTO</div></div>
    <h1>Recuperar acesso</h1>
    <p class="sub">Informe seu e-mail e enviaremos um link para redefinir sua senha.</p>
    <label for="email">E-mail</label>
    <input id="email" type="email" autocomplete="username" autofocus placeholder="voce@casasognatto.com.br" />
    <button id="btn">Enviar link</button>
    <div class="msg" id="msg"></div>
    <a class="back" href="/login">← Voltar ao login</a>
  </div>
<script>
  const email = document.getElementById("email");
  const btn = document.getElementById("btn");
  const msg = document.getElementById("msg");
  async function submit() {
    msg.className = "msg"; msg.textContent = ""; btn.disabled = true;
    try {
      await fetch("/api/auth/forgot", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email.value }),
      });
      msg.className = "msg ok";
      msg.textContent = "Se este e-mail estiver cadastrado, você receberá um link em instantes.";
    } catch (e) {
      msg.className = "msg err"; msg.textContent = "Erro de conexão. Tente novamente.";
    } finally { btn.disabled = false; }
  }
  btn.addEventListener("click", submit);
  email.addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); });
</script>
</body>
</html>
