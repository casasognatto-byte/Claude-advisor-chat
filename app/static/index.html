<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Casa Sognatto · Chat</title>
<style>
  @font-face { font-family:'Benjamin'; src:url('/static/fonts/FSBenjamin-Light.otf') format('opentype'); font-weight:300; font-display:swap; }
  @font-face { font-family:'Benjamin'; src:url('/static/fonts/FSBenjamin-Regular.otf') format('opentype'); font-weight:400; font-display:swap; }
  @font-face { font-family:'Sackers'; src:url('/static/fonts/SackersGothic-Medium.otf') format('opentype'); font-display:swap; }
  @font-face { font-family:'NeueMontreal'; src:url('/static/fonts/PPNeueMontreal.ttf') format('truetype'); font-display:swap; }

  :root {
    --green-900: #0f2114;
    --green-800: #152C1C;   /* verde Sognatto */
    --green-700: #1d3a27;
    --green-600: #274a34;
    --cream: #ece9e1;
    --muted: #93a597;
    --gold: #c2a06a;
    --gold-soft: #d8bd8b;
    --border: #2a4434;
    --advisor-bg: #20301c;
    --user-bubble: #e7e3d8;
    --user-text: #152C1C;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'NeueMontreal', system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--green-800); color: var(--cream);
    height: 100vh; display: flex; flex-direction: column;
  }
  header {
    padding: 10px 20px; background: var(--green-900);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .key { color: var(--gold); flex: none; }
  .brand .casa { font-family: 'Sackers'; font-size: 9px; letter-spacing: .42em; color: var(--cream); padding-left: .42em; }
  .brand .sognatto { font-family: 'Benjamin'; font-weight: 400; font-size: 21px; letter-spacing: .04em; color: var(--cream); line-height: 1; }
  .brand .sub { font-size: 11px; color: var(--muted); margin-left: 14px; align-self: center; }
  .right { display: flex; align-items: center; gap: 14px; }
  .tokens { font-size: 11.5px; color: var(--muted); text-align: right; line-height: 1.5; }
  .tokens b { color: var(--cream); font-weight: 600; }
  .tokens .g { color: var(--gold); }
  .btn {
    background: transparent; color: var(--cream); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 12px;
    font-family: 'Sackers'; letter-spacing: .12em; text-transform: uppercase;
  }
  .btn:hover { border-color: var(--gold); color: var(--gold); }
  main {
    flex: 1; overflow-y: auto; padding: 22px 20px;
    display: flex; flex-direction: column; gap: 14px;
    max-width: 820px; width: 100%; margin: 0 auto;
  }
  .msg { display: flex; }
  .msg.user { justify-content: flex-end; }
  .bubble {
    max-width: 78%; padding: 11px 15px; border-radius: 14px;
    white-space: pre-wrap; word-wrap: break-word; line-height: 1.55; font-size: 14.5px;
  }
  .user .bubble { background: var(--user-bubble); color: var(--user-text); border-bottom-right-radius: 4px; }
  .assistant .bubble { background: var(--green-700); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .advisor {
    background: var(--advisor-bg); border: 1px solid var(--gold);
    border-left-width: 4px; border-radius: 12px; padding: 12px 15px;
    font-size: 13px; line-height: 1.55; max-width: 78%;
  }
  .advisor .label {
    font-family: 'Sackers'; font-size: 10px; font-weight: 600; letter-spacing: .14em;
    color: var(--gold); text-transform: uppercase; margin-bottom: 7px;
    display: flex; align-items: center; gap: 7px;
  }
  .advisor .advice { white-space: pre-wrap; word-wrap: break-word; color: #cdbf9f; }
  .error .bubble { background: #3a1c1c; border: 1px solid #a55; color: #ffd9d9; }
  .typing { color: var(--muted); font-size: 13px; font-style: italic; }
  footer { border-top: 1px solid var(--border); background: var(--green-900); padding: 12px 20px; }
  .composer { max-width: 820px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  textarea {
    flex: 1; resize: none; background: var(--green-700); color: var(--cream);
    border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px;
    font: inherit; font-size: 14.5px; line-height: 1.4; max-height: 160px;
  }
  textarea:focus { outline: none; border-color: var(--gold); }
  #send {
    background: var(--gold); color: #1c1408; border: none; border-radius: 10px;
    padding: 11px 20px; font-family: 'Sackers'; font-size: 12px;
    letter-spacing: .14em; text-transform: uppercase; cursor: pointer;
  }
  #send:hover { background: var(--gold-soft); }
  #send:disabled { opacity: .5; cursor: default; }
  .hint { max-width: 820px; margin: 7px auto 0; font-size: 10.5px; color: var(--muted); }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <svg class="key" width="16" height="38" viewBox="0 0 24 56" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
        <circle cx="12" cy="11" r="8"/><circle cx="12" cy="11" r="2.6" fill="currentColor" stroke="none"/>
        <line x1="12" y1="19" x2="12" y2="52"/><line x1="12" y1="46" x2="19" y2="46"/><line x1="12" y1="40" x2="17.5" y2="40"/>
      </svg>
      <div>
        <div class="casa">CASA</div>
        <div class="sognatto">SOGNATTO</div>
      </div>
      <div class="sub">Assistente · Executor + Advisor</div>
    </div>
    <div class="right">
      <div class="tokens">
        Executor: <b><span id="tok-exec-in">0</span></b> / <b><span id="tok-exec-out">0</span></b><br>
        <span class="g">Advisor:</span> <b><span id="tok-adv-in">0</span></b> / <b><span id="tok-adv-out">0</span></b>
      </div>
      <button class="btn" id="clear">Limpar</button>
      <button class="btn" id="logout">Sair</button>
    </div>
  </header>

  <main id="chat"></main>

  <footer>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Escreva sua mensagem… (Enter envia, Shift+Enter quebra linha)"></textarea>
      <button id="send">Enviar</button>
    </div>
    <div class="hint">A chave da API fica protegida no servidor · as consultas ao advisor aparecem destacadas em dourado.</div>
  </footer>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const clearBtn = document.getElementById("clear");
  const logoutBtn = document.getElementById("logout");

  let messages = [];
  const tokens = { execIn: 0, execOut: 0, advIn: 0, advOut: 0, advAvailable: false };

  function scrollDown() { chat.scrollTop = chat.scrollHeight; }
  function addUser(text) {
    const r = document.createElement("div"); r.className = "msg user";
    const b = document.createElement("div"); b.className = "bubble"; b.textContent = text;
    r.appendChild(b); chat.appendChild(r); scrollDown();
  }
  function addAssistant(text) {
    if (!text) return;
    const r = document.createElement("div"); r.className = "msg assistant";
    const b = document.createElement("div"); b.className = "bubble"; b.textContent = text;
    r.appendChild(b); chat.appendChild(r); scrollDown();
  }
  function addAdvisor(advice) {
    const box = document.createElement("div"); box.className = "advisor";
    const l = document.createElement("div"); l.className = "label"; l.textContent = "🔑 Advisor consultado";
    const body = document.createElement("div"); body.className = "advice";
    body.textContent = advice || "(consulta sem texto retornado)";
    box.appendChild(l); box.appendChild(body); chat.appendChild(box); scrollDown();
  }
  function addError(text) {
    const r = document.createElement("div"); r.className = "msg assistant error";
    const b = document.createElement("div"); b.className = "bubble"; b.textContent = "⚠️ " + text;
    r.appendChild(b); chat.appendChild(r); scrollDown();
  }
  let typingEl = null;
  function setTyping(on) {
    if (on) { typingEl = document.createElement("div"); typingEl.className = "typing"; typingEl.textContent = "pensando…"; chat.appendChild(typingEl); scrollDown(); }
    else if (typingEl) { typingEl.remove(); typingEl = null; }
  }
  function renderTokens() {
    document.getElementById("tok-exec-in").textContent = tokens.execIn;
    document.getElementById("tok-exec-out").textContent = tokens.execOut;
    document.getElementById("tok-adv-in").textContent = tokens.advAvailable ? tokens.advIn : "0";
    document.getElementById("tok-adv-out").textContent = tokens.advAvailable ? tokens.advOut : "0";
  }
  function updateTokens(usage) {
    if (!usage) return;
    if (usage.executor) { tokens.execIn += usage.executor.input_tokens || 0; tokens.execOut += usage.executor.output_tokens || 0; }
    if (usage.advisor && (usage.advisor.input_tokens != null || usage.advisor.output_tokens != null)) {
      tokens.advAvailable = true; tokens.advIn += usage.advisor.input_tokens || 0; tokens.advOut += usage.advisor.output_tokens || 0;
    }
    renderTokens();
  }
  async function send() {
    const text = input.value.trim(); if (!text) return;
    input.value = ""; autosize(); sendBtn.disabled = true;
    messages.push({ role: "user", content: text }); addUser(text); setTyping(true);
    try {
      const res = await fetch("/api/chat", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages }),
      });
      setTyping(false);
      if (res.status === 401) { window.location.href = "/login"; return; }
      if (!res.ok) {
        let detail = res.statusText;
        try { detail = (await res.json()).detail || detail; } catch (_) {}
        addError(detail); return;
      }
      const data = await res.json();
      for (const m of data.append) messages.push(m);
      for (const a of data.advisor) addAdvisor(a.advice);
      addAssistant(data.text); updateTokens(data.usage);
    } catch (e) { setTyping(false); addError(String(e)); }
    finally { sendBtn.disabled = false; input.focus(); }
  }
  function clearChat() {
    messages = []; chat.innerHTML = "";
    tokens.execIn = tokens.execOut = tokens.advIn = tokens.advOut = 0; tokens.advAvailable = false;
    renderTokens(); input.focus();
  }
  async function logout() {
    try { await fetch("/api/logout", { method: "POST" }); } catch (_) {}
    window.location.href = "/login";
  }
  function autosize() { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 160) + "px"; }

  input.addEventListener("input", autosize);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } });
  sendBtn.addEventListener("click", send);
  clearBtn.addEventListener("click", clearChat);
  logoutBtn.addEventListener("click", logout);
  input.focus();
</script>
</body>
</html>
