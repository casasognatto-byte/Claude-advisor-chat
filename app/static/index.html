<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat Executor + Advisor</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f242e;
    --text: #e6e8ee;
    --muted: #9aa3b2;
    --user: #2b6cb0;
    --advisor-bg: #2a2410;
    --advisor-border: #d9a441;
    --border: #2a2f3a;
    --accent: #4f8cff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .sub { font-size: 12px; color: var(--muted); }
  .tokens {
    font-size: 12px; color: var(--muted); text-align: right; line-height: 1.5;
  }
  .tokens b { color: var(--text); font-weight: 600; }
  #clear {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 13px;
  }
  #clear:hover { background: #2a3040; }
  main {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 14px;
    max-width: 820px; width: 100%; margin: 0 auto;
  }
  .msg { display: flex; }
  .msg.user { justify-content: flex-end; }
  .bubble {
    max-width: 78%; padding: 11px 14px; border-radius: 12px;
    white-space: pre-wrap; word-wrap: break-word; line-height: 1.5; font-size: 14.5px;
  }
  .user .bubble { background: var(--user); color: #fff; border-bottom-right-radius: 4px; }
  .assistant .bubble { background: var(--panel-2); border-bottom-left-radius: 4px; }
  .advisor {
    background: var(--advisor-bg);
    border: 1px solid var(--advisor-border);
    border-left-width: 4px;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 13.5px;
    line-height: 1.5;
    max-width: 78%;
  }
  .advisor .label {
    font-size: 11px; font-weight: 700; letter-spacing: .04em;
    color: var(--advisor-border); text-transform: uppercase; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .advisor .advice { white-space: pre-wrap; word-wrap: break-word; }
  .error .bubble { background: #3a1c1c; border: 1px solid #a33; }
  .typing { color: var(--muted); font-size: 13px; font-style: italic; }
  footer {
    border-top: 1px solid var(--border); background: var(--panel);
    padding: 12px 20px;
  }
  .composer {
    max-width: 820px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end;
  }
  textarea {
    flex: 1; resize: none; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; padding: 11px 12px;
    font: inherit; font-size: 14.5px; line-height: 1.4; max-height: 160px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  #send {
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 11px 18px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  #send:disabled { opacity: .5; cursor: default; }
  .hint { max-width: 820px; margin: 6px auto 0; font-size: 11px; color: var(--muted); }
</style>
</head>
<body>
  <header>
    <div>
      <h1>Chat Executor + Advisor</h1>
      <div class="sub">Executor: <span id="m-exec"></span> · Advisor: <span id="m-adv"></span></div>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <div class="tokens">
        Executor: <b><span id="tok-exec-in">0</span></b> in / <b><span id="tok-exec-out">0</span></b> out<br>
        Advisor: <b><span id="tok-adv-in">0</span></b> in / <b><span id="tok-adv-out">0</span></b> out
      </div>
      <button id="clear">Limpar</button>
    </div>
  </header>

  <main id="chat"></main>

  <footer>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Escreva sua mensagem… (Enter envia, Shift+Enter quebra linha)"></textarea>
      <button id="send">Enviar</button>
    </div>
    <div class="hint">A chave da API fica protegida no servidor. As consultas ao advisor aparecem destacadas em dourado.</div>
  </footer>

<script>
  const EXEC_MODEL = "claude-sonnet-4-6";
  const ADV_MODEL = "claude-opus-4-8";
  document.getElementById("m-exec").textContent = EXEC_MODEL;
  document.getElementById("m-adv").textContent = ADV_MODEL;

  const chat = document.getElementById("chat");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const clearBtn = document.getElementById("clear");

  // Histórico enviado para a API (a API é stateless — mandamos tudo sempre).
  let messages = [];
  const tokens = { execIn: 0, execOut: 0, advIn: 0, advOut: 0, advAvailable: false };

  function scrollDown() { chat.scrollTop = chat.scrollHeight; }

  function addUser(text) {
    const row = document.createElement("div");
    row.className = "msg user";
    const b = document.createElement("div");
    b.className = "bubble";
    b.textContent = text;
    row.appendChild(b);
    chat.appendChild(row);
    scrollDown();
  }

  function addAssistant(text) {
    if (!text) return;
    const row = document.createElement("div");
    row.className = "msg assistant";
    const b = document.createElement("div");
    b.className = "bubble";
    b.textContent = text;
    row.appendChild(b);
    chat.appendChild(row);
    scrollDown();
  }

  function addAdvisor(advice) {
    const box = document.createElement("div");
    box.className = "advisor";
    const label = document.createElement("div");
    label.className = "label";
    label.textContent = "💡 Advisor consultado";
    const body = document.createElement("div");
    body.className = "advice";
    body.textContent = advice || "(sem conteúdo retornado)";
    box.appendChild(label);
    box.appendChild(body);
    chat.appendChild(box);
    scrollDown();
  }

  function addError(text) {
    const row = document.createElement("div");
    row.className = "msg assistant error";
    const b = document.createElement("div");
    b.className = "bubble";
    b.textContent = "⚠️ " + text;
    row.appendChild(b);
    chat.appendChild(row);
    scrollDown();
  }

  let typingEl = null;
  function setTyping(on) {
    if (on) {
      typingEl = document.createElement("div");
      typingEl.className = "typing";
      typingEl.textContent = "pensando…";
      chat.appendChild(typingEl);
      scrollDown();
    } else if (typingEl) {
      typingEl.remove();
      typingEl = null;
    }
  }

  function renderTokens() {
    document.getElementById("tok-exec-in").textContent = tokens.execIn;
    document.getElementById("tok-exec-out").textContent = tokens.execOut;
    document.getElementById("tok-adv-in").textContent = tokens.advAvailable ? tokens.advIn : "n/d";
    document.getElementById("tok-adv-out").textContent = tokens.advAvailable ? tokens.advOut : "n/d";
  }

  function updateTokens(usage) {
    if (!usage) return;
    if (usage.executor) {
      tokens.execIn += usage.executor.input_tokens || 0;
      tokens.execOut += usage.executor.output_tokens || 0;
    }
    if (usage.advisor && (usage.advisor.input_tokens != null || usage.advisor.output_tokens != null)) {
      tokens.advAvailable = true;
      tokens.advIn += usage.advisor.input_tokens || 0;
      tokens.advOut += usage.advisor.output_tokens || 0;
    }
    renderTokens();
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;
    input.value = "";
    autosize();
    sendBtn.disabled = true;

    messages.push({ role: "user", content: text });
    addUser(text);
    setTyping(true);

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages }),
      });
      setTyping(false);

      if (!res.ok) {
        let detail = res.statusText;
        try { detail = (await res.json()).detail || detail; } catch (_) {}
        addError(detail);
        return;
      }

      const data = await res.json();
      // Preserva o histórico completo (inclui blocos advisor_tool_result).
      for (const m of data.append) messages.push(m);
      // Advisor primeiro (foi consultado durante o turno), depois a resposta.
      for (const a of data.advisor) addAdvisor(a.advice);
      addAssistant(data.text);
      updateTokens(data.usage);
    } catch (e) {
      setTyping(false);
      addError(String(e));
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  function clearChat() {
    messages = [];
    chat.innerHTML = "";
    tokens.execIn = tokens.execOut = tokens.advIn = tokens.advOut = 0;
    tokens.advAvailable = false;
    renderTokens();
    input.focus();
  }

  function autosize() {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 160) + "px";
  }

  input.addEventListener("input", autosize);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  sendBtn.addEventListener("click", send);
  clearBtn.addEventListener("click", clearChat);
  input.focus();
</script>
</body>
</html>
