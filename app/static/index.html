<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Casa Sognatto · Chat</title>
<style>
  @font-face { font-family:'Benjamin'; src:url('/static/fonts/FSBenjamin-Light.otf') format('opentype'); font-weight:300; font-display:swap; }
  @font-face { font-family:'Benjamin'; src:url('/static/fonts/FSBenjamin-Regular.otf') format('opentype'); font-weight:400; font-display:swap; }
  @font-face { font-family:'Sackers'; src:url('/static/fonts/SackersGothic-Medium.otf') format('opentype'); font-display:swap; }
  @font-face { font-family:'NeueMontreal'; src:url('/static/fonts/PPNeueMontreal.ttf') format('truetype'); font-display:swap; }

  :root {
    --green-950: #0b1a10; --green-900: #0f2114; --green-800: #152C1C;
    --green-700: #1d3a27; --green-600: #274a34;
    --cream: #ece9e1; --muted: #93a597; --gold: #c2a06a; --gold-soft: #d8bd8b;
    --border: #2a4434; --advisor-bg: #20301c; --user-bubble: #e7e3d8; --user-text: #152C1C;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin: 0; display: flex; overflow: hidden; font-family: 'NeueMontreal', system-ui, -apple-system, "Segoe UI", sans-serif; background: var(--green-800); color: var(--cream); }

  .sidebar { width: 270px; flex: none; background: var(--green-950); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: width .18s ease, opacity .18s ease; }
  body.collapsed .sidebar { width: 0; opacity: 0; pointer-events: none; }
  .sb-brand { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .sb-brand .key { color: var(--gold); flex: none; }
  .sb-brand .casa { font-family:'Sackers'; font-size: 8px; letter-spacing:.4em; color: var(--cream); padding-left:.4em; }
  .sb-brand .sognatto { font-family:'Benjamin'; font-size: 18px; letter-spacing:.04em; color: var(--cream); line-height: 1; }
  .new-btn { margin: 12px; padding: 11px 12px; background: var(--gold); color:#1c1408; border: none; border-radius: 10px; cursor: pointer; font-family:'Sackers'; font-size: 11px; letter-spacing:.12em; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .new-btn:hover { background: var(--gold-soft); }
  .owner-filter { margin: 0 12px 10px; padding: 8px 10px; background: var(--green-800); color: var(--cream); border: 1px solid var(--border); border-radius: 8px; font: inherit; font-size: 12.5px; }
  .owner-filter:focus { outline: none; border-color: var(--gold); }
  .conv-list { flex: 1; overflow-y: auto; padding: 4px 8px 8px; }
  .conv { display: flex; align-items: center; gap: 8px; padding: 9px 10px; margin-bottom: 3px; border-radius: 9px; cursor: pointer; color: var(--cream); font-size: 13.5px; border: 1px solid transparent; }
  .conv:hover { background: var(--green-800); }
  .conv.active { background: var(--green-700); border-color: var(--gold); }
  .conv .title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv .del { flex: none; opacity: 0; color: var(--muted); background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 6px; }
  .conv:hover .del { opacity: .8; }
  .conv .del:hover { color: #ff9d9d; background: rgba(255,255,255,.06); }
  .sb-footer { border-top: 1px solid var(--border); padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 12.5px; color: var(--muted); }
  .sb-footer .user { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sb-footer .actions { display: flex; gap: 6px; flex: none; }
  .sb-footer button, .sb-footer a { flex: none; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 11px; font-family:'Sackers'; letter-spacing:.1em; text-transform: uppercase; text-decoration: none; }
  .sb-footer button:hover, .sb-footer a:hover { border-color: var(--gold); color: var(--gold); }

  .content { flex: 1; min-width: 0; display: flex; flex-direction: column; height: 100vh; }
  header { padding: 10px 18px; background: var(--green-900); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .h-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .toggle { background: transparent; border: 1px solid var(--border); color: var(--cream); border-radius: 8px; padding: 6px 10px; cursor: pointer; font-size: 15px; line-height: 1; }
  .toggle:hover { border-color: var(--gold); color: var(--gold); }
  .h-title { font-family:'Benjamin'; font-size: 16px; color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tokens { font-size: 11.5px; color: var(--muted); text-align: right; line-height: 1.5; flex: none; }
  .tokens b { color: var(--cream); font-weight: 600; }
  .tokens .g { color: var(--gold); }

  main { flex: 1; overflow-y: auto; padding: 22px 20px; display: flex; flex-direction: column; gap: 14px; }
  .inner { max-width: 820px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
  .msg { display: flex; } .msg.user { justify-content: flex-end; }
  .bubble { max-width: 78%; padding: 11px 15px; border-radius: 14px; white-space: pre-wrap; word-wrap: break-word; line-height: 1.55; font-size: 14.5px; }
  .user .bubble { background: var(--user-bubble); color: var(--user-text); border-bottom-right-radius: 4px; }
  .assistant .bubble { background: var(--green-700); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .advisor { background: var(--advisor-bg); border: 1px solid var(--gold); border-left-width: 4px; border-radius: 12px; padding: 12px 15px; font-size: 13px; line-height: 1.55; max-width: 78%; }
  .advisor .label { font-family:'Sackers'; font-size: 10px; font-weight: 600; letter-spacing:.14em; color: var(--gold); text-transform: uppercase; margin-bottom: 7px; display: flex; align-items: center; gap: 7px; }
  .advisor .advice { white-space: pre-wrap; word-wrap: break-word; color: #cdbf9f; }
  .error .bubble { background: #3a1c1c; border: 1px solid #a55; color: #ffd9d9; }
  .empty { margin: auto; text-align: center; color: var(--muted); font-size: 14px; }
  .empty .key { color: var(--gold); opacity: .8; margin-bottom: 10px; font-size: 34px; }
  .typing { color: var(--muted); font-size: 13px; font-style: italic; }

  footer { border-top: 1px solid var(--border); background: var(--green-900); padding: 12px 20px; }
  .composer { max-width: 820px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  textarea { flex: 1; resize: none; background: var(--green-700); color: var(--cream); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; font: inherit; font-size: 14.5px; line-height: 1.4; max-height: 160px; }
  textarea:focus { outline: none; border-color: var(--gold); }
  #send { background: var(--gold); color: #1c1408; border: none; border-radius: 10px; padding: 11px 20px; font-family:'Sackers'; font-size: 12px; letter-spacing:.14em; text-transform: uppercase; cursor: pointer; }
  #send:hover { background: var(--gold-soft); } #send:disabled { opacity: .5; cursor: default; }
  .icon-btn { flex: none; background: var(--green-700); color: var(--cream); border: 1px solid var(--border); border-radius: 10px; width: 44px; height: 44px; font-size: 18px; cursor: pointer; }
  .icon-btn:hover { border-color: var(--gold); }
  .icon-btn:disabled { opacity: .5; cursor: default; }
  .video-variant { flex: none; background: var(--green-700); color: var(--cream); border: 1px solid var(--border); border-radius: 10px; padding: 0 8px; font: inherit; font-size: 12px; }
  .hint { max-width: 820px; margin: 7px auto 0; font-size: 10.5px; color: var(--muted); }

  .video-card { max-width: 78%; background: var(--green-700); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
  .video-card .status { font-size: 13px; color: var(--muted); font-style: italic; }
  .video-card video { max-width: 100%; border-radius: 8px; display: block; }
  .video-card .dl { display: inline-block; margin-top: 8px; font-size: 12px; color: var(--gold); text-decoration: none; }
  .video-card .dl:hover { color: var(--gold-soft); }

  .neusa-toast { position: fixed; right: 20px; bottom: 20px; max-width: 300px; background: var(--advisor-bg); border: 1px solid var(--gold); border-left-width: 4px; border-radius: 12px; padding: 14px 16px; font-size: 13.5px; line-height: 1.5; color: var(--cream); box-shadow: 0 12px 40px rgba(0,0,0,.4); z-index: 50; display: flex; gap: 10px; align-items: flex-start; animation: neusa-in .25s ease; }
  .neusa-toast .icon { flex: none; color: var(--gold); font-size: 18px; }
  .neusa-toast .close { flex: none; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; padding: 0; margin-left: auto; }
  .neusa-toast .close:hover { color: var(--gold); }
  @keyframes neusa-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="sb-brand">
      <svg class="key" width="18" height="36" viewBox="0 0 60 120" fill="none">
        <g stroke="currentColor" stroke-width="6"><circle cx="30" cy="20" r="10"/><circle cx="18" cy="37" r="10"/><circle cx="42" cy="37" r="10"/></g>
        <rect x="26.5" y="50" width="7" height="58" rx="1.5" fill="currentColor"/>
        <rect x="33.5" y="92" width="11" height="6" fill="currentColor"/>
        <rect x="33.5" y="102" width="8" height="6" fill="currentColor"/>
      </svg>
      <div><div class="casa">CASA</div><div class="sognatto">SOGNATTO</div></div>
    </div>
    <button class="new-btn" id="new">＋ Nova conversa</button>
    <select class="owner-filter" id="ownerFilter" style="display:none;"></select>
    <div class="conv-list" id="convList"></div>
    <div class="sb-footer">
      <span class="user" id="userLabel">—</span>
      <div class="actions">
        <a id="adminLink" href="/admin" style="display:none;">Painel</a>
        <button id="logout">Sair</button>
      </div>
    </div>
  </aside>

  <div class="content">
    <header>
      <div class="h-left">
        <button class="toggle" id="toggle" title="Mostrar/ocultar conversas">☰</button>
        <div class="h-title" id="hTitle">Nova conversa</div>
      </div>
      <div class="tokens">
        Executor: <b><span id="tok-exec-in">0</span></b> / <b><span id="tok-exec-out">0</span></b><br>
        <span class="g">Advisor:</span> <b><span id="tok-adv-in">0</span></b> / <b><span id="tok-adv-out">0</span></b>
      </div>
    </header>
    <main id="scroll"><div class="inner" id="chat"></div></main>
    <footer>
      <div class="composer">
        <textarea id="input" rows="1" placeholder="Escreva sua mensagem… (Enter envia, Shift+Enter quebra linha)"></textarea>
        <select class="video-variant" id="videoVariant" style="display:none;" title="Modo (só você vê isso)">
          <option value="">Padrão</option>
          <option value="a">Modo A</option>
          <option value="b">Modo B</option>
        </select>
        <input type="file" id="imageFile" accept="image/*" style="display:none;" />
        <button class="icon-btn" id="imageBtn" title="Gerar render a partir de uma imagem">🖼️</button>
        <input type="file" id="videoFile" accept="image/*" style="display:none;" />
        <button class="icon-btn" id="videoBtn" title="Gerar vídeo a partir de uma imagem">🎬</button>
        <button id="send">Enviar</button>
      </div>
      <div class="hint" id="hint">A chave da API fica protegida no servidor · consultas ao advisor aparecem em dourado.</div>
    </footer>
  </div>

<script>
  // ---------- Camada de armazenamento (remoto via API ou local) ----------
  const Store = {
    mode: "local", user: "anon",
    key() { return "cs_conversations__" + this.user; },
    lAll() { try { return JSON.parse(localStorage.getItem(this.key())) || []; } catch (_) { return []; } },
    lSave(a) { try { localStorage.setItem(this.key(), JSON.stringify(a)); } catch (_) {} },

    async init(user) {
      this.user = user;
      try {
        const res = await fetch("/api/conversations?owner=all");
        if (res.status === 401) { window.location.href = "/login"; return []; }
        if (res.ok) { this.mode = "remote"; return await res.json(); }
      } catch (_) {}
      this.mode = "local";
      return this.lAll().map(c => ({ id: c.id, title: c.title, updatedAt: c.updatedAt || 0 }));
    },
    async listByOwner(owner) {
      if (this.mode !== "remote") return this.lAll().map(c => ({ id: c.id, title: c.title, updatedAt: c.updatedAt || 0 }));
      try {
        const res = await fetch("/api/conversations?owner=" + encodeURIComponent(owner));
        if (res.status === 401) { window.location.href = "/login"; return []; }
        if (res.ok) return await res.json();
      } catch (_) {}
      return [];
    },
    async getData(id) {
      if (this.mode === "remote") {
        const res = await fetch("/api/conversations/" + id);
        if (res.ok) return (await res.json()).data || {};
        return {};
      }
      const c = this.lAll().find(x => x.id === id);
      return c ? (c.data || {}) : {};
    },
    async create(conv) {
      if (this.mode === "remote") {
        await fetch("/api/conversations", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(conv) });
      } else {
        const a = this.lAll(); a.unshift({ id: conv.id, title: conv.title, data: conv.data, updatedAt: Date.now() }); this.lSave(a);
      }
    },
    async update(id, fields) {
      if (this.mode === "remote") {
        await fetch("/api/conversations/" + id, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(fields) });
      } else {
        const a = this.lAll(); const c = a.find(x => x.id === id);
        if (c) { if (fields.title != null) c.title = fields.title; if (fields.data != null) c.data = fields.data; c.updatedAt = Date.now(); a.sort((x, y) => (y.updatedAt || 0) - (x.updatedAt || 0)); this.lSave(a); }
      }
    },
    async remove(id) {
      if (this.mode === "remote") { await fetch("/api/conversations/" + id, { method: "DELETE" }); }
      else { this.lSave(this.lAll().filter(x => x.id !== id)); }
    },
  };

  // ---------- Estado ----------
  let conversations = [];   // {id,title,updatedAt,data|null,_new}
  let activeId = null;

  const chat = document.getElementById("chat");
  const scroll = document.getElementById("scroll");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const convListEl = document.getElementById("convList");
  const hTitle = document.getElementById("hTitle");

  function uid() { return "c" + Date.now() + Math.random().toString(36).slice(2, 7); }
  function emptyTokens() { return { execIn: 0, execOut: 0, advIn: 0, advOut: 0, advAvailable: false }; }
  function emptyData() { return { apiMessages: [], view: [], tokens: emptyTokens() }; }
  function active() { return conversations.find(c => c.id === activeId); }

  async function ensureData(c) {
    if (c.data == null) c.data = await Store.getData(c.id);
    if (!c.data.apiMessages) c.data.apiMessages = [];
    if (!c.data.view) c.data.view = [];
    if (!c.data.tokens) c.data.tokens = emptyTokens();
    return c.data;
  }
  async function persist(c) {
    c.updatedAt = Date.now();
    if (c._new) { await Store.create({ id: c.id, title: c.title, data: c.data }); c._new = false; }
    else { await Store.update(c.id, { title: c.title, data: c.data }); }
    conversations.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
    renderList();
  }

  // ---------- Renderização ----------
  function renderList() {
    convListEl.innerHTML = "";
    for (const c of conversations) {
      const row = document.createElement("div");
      row.className = "conv" + (c.id === activeId ? " active" : "");
      const t = document.createElement("div");
      t.className = "title"; t.textContent = c.title || "Nova conversa"; t.title = "Clique duplo para renomear";
      const del = document.createElement("button");
      del.className = "del"; del.innerHTML = "🗑"; del.title = "Excluir conversa";
      row.appendChild(t); row.appendChild(del);
      row.addEventListener("click", () => selectConv(c.id));
      t.addEventListener("dblclick", (e) => { e.stopPropagation(); renameConv(c.id); });
      del.addEventListener("click", (e) => { e.stopPropagation(); deleteConv(c.id); });
      convListEl.appendChild(row);
    }
  }
  function renderItem(item) {
    if (item.type === "user") {
      const r = document.createElement("div"); r.className = "msg user";
      const b = document.createElement("div"); b.className = "bubble"; b.textContent = item.text; r.appendChild(b); chat.appendChild(r);
    } else if (item.type === "assistant") {
      if (!item.text) return;
      const r = document.createElement("div"); r.className = "msg assistant";
      const b = document.createElement("div"); b.className = "bubble"; b.textContent = item.text; r.appendChild(b); chat.appendChild(r);
    } else if (item.type === "advisor") {
      const box = document.createElement("div"); box.className = "advisor";
      const l = document.createElement("div"); l.className = "label"; l.textContent = "🔑 Advisor consultado";
      const body = document.createElement("div"); body.className = "advice"; body.textContent = item.advice || "(consulta sem texto retornado)";
      box.appendChild(l); box.appendChild(body); chat.appendChild(box);
    } else if (item.type === "error") {
      const r = document.createElement("div"); r.className = "msg assistant error";
      const b = document.createElement("div"); b.className = "bubble"; b.textContent = "⚠️ " + item.text; r.appendChild(b); chat.appendChild(r);
    } else if (item.type === "video") {
      const r = document.createElement("div"); r.className = "msg assistant";
      const card = document.createElement("div"); card.className = "video-card"; card.id = "video-" + item.jobId;
      renderVideoCardBody(card, item);
      r.appendChild(card); chat.appendChild(r);
    } else if (item.type === "image") {
      const r = document.createElement("div"); r.className = "msg assistant";
      const card = document.createElement("div"); card.className = "video-card"; card.id = "image-" + item.jobId;
      renderImageCardBody(card, item);
      r.appendChild(card); chat.appendChild(r);
    }
  }
  function renderVideoCardBody(card, item) {
    card.innerHTML = "";
    if (item.status === "done") {
      const v = document.createElement("video");
      v.controls = true; v.src = "/api/video/file/" + item.jobId;
      const a = document.createElement("a");
      a.className = "dl"; a.href = "/api/video/file/" + item.jobId; a.download = "video.mp4"; a.textContent = "Baixar vídeo";
      card.appendChild(v); card.appendChild(a);
    } else if (item.status === "error") {
      const s = document.createElement("div"); s.className = "status"; s.textContent = "⚠️ " + (item.error || "Falha ao gerar o vídeo, tente novamente.");
      card.appendChild(s);
    } else {
      const s = document.createElement("div"); s.className = "status"; s.textContent = "Gerando vídeo… isso pode levar alguns minutos.";
      card.appendChild(s);
    }
  }
  function renderImageCardBody(card, item) {
    card.innerHTML = "";
    if (item.status === "done") {
      const img = document.createElement("img");
      img.src = "/api/image/file/" + item.jobId;
      const a = document.createElement("a");
      a.className = "dl"; a.href = "/api/image/file/" + item.jobId; a.download = "render.png"; a.textContent = "Baixar imagem";
      card.appendChild(img); card.appendChild(a);
    } else if (item.status === "error") {
      const s = document.createElement("div"); s.className = "status"; s.textContent = "⚠️ " + (item.error || "Falha ao gerar a imagem, tente novamente.");
      card.appendChild(s);
    } else {
      const s = document.createElement("div"); s.className = "status"; s.textContent = "Gerando render…";
      card.appendChild(s);
    }
  }
  function renderChat() {
    chat.innerHTML = "";
    const c = active();
    if (!c || !c.data || c.data.view.length === 0) {
      const e = document.createElement("div"); e.className = "empty";
      e.innerHTML = '<div class="key">🔑</div>Comece uma nova conversa.<br>Pergunte algo — o advisor entra nos momentos estratégicos.';
      chat.appendChild(e);
    } else {
      for (const item of c.data.view) renderItem(item);
    }
    renderTokens(); scrollDown();
    hTitle.textContent = c ? (c.title || "Nova conversa") : "Nova conversa";
    if (c && c.data) {
      for (const item of c.data.view) {
        if (item.type === "video" && item.jobId && (item.status === "queued" || item.status === "processing")) {
          pollVideoJob(item.jobId, item, c);
        } else if (item.type === "image" && item.jobId && (item.status === "queued" || item.status === "processing")) {
          pollImageJob(item.jobId, item, c);
        }
      }
    }
  }
  function scrollDown() { scroll.scrollTop = scroll.scrollHeight; }
  let typingEl = null;
  function setTyping(on) {
    if (on) { typingEl = document.createElement("div"); typingEl.className = "typing"; typingEl.textContent = "pensando…"; chat.appendChild(typingEl); scrollDown(); }
    else if (typingEl) { typingEl.remove(); typingEl = null; }
  }
  function renderTokens() {
    const c = active();
    const t = (c && c.data && c.data.tokens) ? c.data.tokens : emptyTokens();
    document.getElementById("tok-exec-in").textContent = t.execIn;
    document.getElementById("tok-exec-out").textContent = t.execOut;
    document.getElementById("tok-adv-in").textContent = t.advAvailable ? t.advIn : "0";
    document.getElementById("tok-adv-out").textContent = t.advAvailable ? t.advOut : "0";
  }

  // ---------- Operações ----------
  function newConv() {
    const c = { id: uid(), title: "Nova conversa", updatedAt: Date.now(), data: emptyData(), _new: true };
    conversations.unshift(c); activeId = c.id; renderList(); renderChat(); input.focus();
  }
  async function selectConv(id) {
    activeId = id; const c = active(); if (c) await ensureData(c);
    renderList(); renderChat(); input.focus();
  }
  async function renameConv(id) {
    const c = conversations.find(x => x.id === id); if (!c) return;
    const name = prompt("Nome da conversa:", c.title || "");
    if (name === null) return;
    c.title = name.trim() || "Nova conversa";
    await ensureData(c); await persist(c);
    if (id === activeId) hTitle.textContent = c.title;
  }
  async function deleteConv(id) {
    const c = conversations.find(x => x.id === id); if (!c) return;
    if (!confirm('Excluir a conversa "' + (c.title || "Nova conversa") + '"? Isso não pode ser desfeito.')) return;
    if (!c._new) await Store.remove(id);
    conversations = conversations.filter(x => x.id !== id);
    if (activeId === id) activeId = conversations.length ? conversations[0].id : null;
    if (!conversations.length) { newConv(); } else { await selectConv(activeId); }
  }

  async function send() {
    const text = input.value.trim(); if (!text) return;
    let c = active(); if (!c) { newConv(); c = active(); }
    await ensureData(c);
    input.value = ""; autosize(); sendBtn.disabled = true;

    c.data.apiMessages.push({ role: "user", content: text });
    c.data.view.push({ type: "user", text });
    if (c.title === "Nova conversa") { c.title = text.slice(0, 42) + (text.length > 42 ? "…" : ""); hTitle.textContent = c.title; }
    renderItem({ type: "user", text }); scrollDown(); setTyping(true);
    await persist(c);

    try {
      const res = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ messages: c.data.apiMessages }) });
      setTyping(false);
      if (res.status === 401) { window.location.href = "/login"; return; }
      if (!res.ok) {
        let detail = res.statusText; try { detail = (await res.json()).detail || detail; } catch (_) {}
        c.data.view.push({ type: "error", text: detail }); renderItem({ type: "error", text: detail }); scrollDown(); await persist(c); return;
      }
      const data = await res.json();
      for (const m of data.append) c.data.apiMessages.push(m);
      for (const a of data.advisor) { c.data.view.push({ type: "advisor", advice: a.advice }); renderItem({ type: "advisor", advice: a.advice }); }
      c.data.view.push({ type: "assistant", text: data.text }); renderItem({ type: "assistant", text: data.text });
      applyTokens(c, data.usage); renderTokens(); scrollDown(); await persist(c);
    } catch (e) {
      setTyping(false);
      c.data.view.push({ type: "error", text: String(e) }); renderItem({ type: "error", text: String(e) }); scrollDown(); await persist(c);
    } finally { sendBtn.disabled = false; input.focus(); }
  }
  function applyTokens(c, usage) {
    if (!usage) return;
    const t = c.data.tokens;
    if (usage.executor) { t.execIn += usage.executor.input_tokens || 0; t.execOut += usage.executor.output_tokens || 0; }
    if (usage.advisor && (usage.advisor.input_tokens != null || usage.advisor.output_tokens != null)) {
      t.advAvailable = true; t.advIn += usage.advisor.input_tokens || 0; t.advOut += usage.advisor.output_tokens || 0;
    }
  }

  // ---------- Geração de vídeo (ícone no composer) ----------
  async function startVideoJob(file) {
    let c = active(); if (!c) { newConv(); c = active(); }
    await ensureData(c);
    const prompt = input.value.trim();
    const variant = document.getElementById("videoVariant").value;

    const item = { type: "video", jobId: null, status: "queued" };
    c.data.view.push(item);
    const r = document.createElement("div"); r.className = "msg assistant";
    const card = document.createElement("div"); card.className = "video-card";
    renderVideoCardBody(card, item);
    r.appendChild(card); chat.appendChild(r); scrollDown();

    const form = new FormData();
    form.append("image", file);
    form.append("prompt", prompt);
    form.append("conversation_id", c.id);
    if (variant) form.append("variant", variant);

    try {
      const res = await fetch("/api/video/jobs", { method: "POST", body: form });
      if (res.status === 401) { window.location.href = "/login"; return; }
      if (!res.ok) { item.status = "error"; item.error = "Não foi possível iniciar a geração."; }
      else {
        const data = await res.json();
        item.jobId = data.id; item.status = data.status || "queued";
      }
    } catch (e) {
      item.status = "error"; item.error = "Erro de conexão.";
    }
    card.id = "video-" + item.jobId;
    renderVideoCardBody(card, item);
    await persist(c);
    if (item.jobId && (item.status === "queued" || item.status === "processing")) pollVideoJob(item.jobId, item, c);
  }

  function pollVideoJob(jobId, item, c) {
    const tick = async () => {
      try {
        const res = await fetch("/api/video/jobs/" + jobId);
        if (res.ok) {
          const data = await res.json();
          item.status = data.status;
          item.error = data.error;
          const card = document.getElementById("video-" + jobId);
          if (card) renderVideoCardBody(card, item);
          if (data.status === "done" || data.status === "error") { await persist(c); return; }
        }
      } catch (_) {}
      setTimeout(tick, 4000);
    };
    setTimeout(tick, 4000);
  }

  document.getElementById("videoBtn").addEventListener("click", () => document.getElementById("videoFile").click());
  document.getElementById("videoFile").addEventListener("change", (e) => {
    const file = e.target.files[0];
    e.target.value = "";
    if (file) startVideoJob(file);
  });

  // ---------- Geração de imagem (ícone no composer) ----------
  async function startImageJob(file) {
    let c = active(); if (!c) { newConv(); c = active(); }
    await ensureData(c);
    const prompt = input.value.trim();

    const item = { type: "image", jobId: null, status: "queued" };
    c.data.view.push(item);
    const r = document.createElement("div"); r.className = "msg assistant";
    const card = document.createElement("div"); card.className = "video-card";
    renderImageCardBody(card, item);
    r.appendChild(card); chat.appendChild(r); scrollDown();

    const form = new FormData();
    form.append("image", file);
    form.append("prompt", prompt);
    form.append("conversation_id", c.id);

    try {
      const res = await fetch("/api/image/jobs", { method: "POST", body: form });
      if (res.status === 401) { window.location.href = "/login"; return; }
      if (!res.ok) { item.status = "error"; item.error = "Não foi possível iniciar a geração."; }
      else {
        const data = await res.json();
        item.jobId = data.id; item.status = data.status || "queued";
      }
    } catch (e) {
      item.status = "error"; item.error = "Erro de conexão.";
    }
    card.id = "image-" + item.jobId;
    renderImageCardBody(card, item);
    await persist(c);
    if (item.jobId && (item.status === "queued" || item.status === "processing")) pollImageJob(item.jobId, item, c);
  }

  function pollImageJob(jobId, item, c) {
    const tick = async () => {
      try {
        const res = await fetch("/api/image/jobs/" + jobId);
        if (res.ok) {
          const data = await res.json();
          item.status = data.status;
          item.error = data.error;
          const card = document.getElementById("image-" + jobId);
          if (card) renderImageCardBody(card, item);
          if (data.status === "done" || data.status === "error") { await persist(c); return; }
        }
      } catch (_) {}
      setTimeout(tick, 2500);
    };
    setTimeout(tick, 2500);
  }

  document.getElementById("imageBtn").addEventListener("click", () => document.getElementById("imageFile").click());
  document.getElementById("imageFile").addEventListener("change", (e) => {
    const file = e.target.files[0];
    e.target.value = "";
    if (file) startImageJob(file);
  });

  function autosize() { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 160) + "px"; }
  async function logout() { try { await fetch("/api/logout", { method: "POST" }); } catch (_) {} window.location.href = "/login"; }

  // ---------- Lembrete de bem-estar da Neusa (a cada 2h de uso) ----------
  function wellnessMessages(name) {
    return [
      `${name}, hora de levantar e dar uma volta — o corpo agradece.`,
      `${name}, já se hidratou hoje? Vale uma pausa para um copo d'água.`,
      `${name}, aproveite a pausa para ir ao banheiro, se precisar.`,
    ];
  }
  function showWellnessReminder(name) {
    const msgs = wellnessMessages(name || "");
    const text = msgs[Math.floor(Math.random() * msgs.length)];
    const box = document.createElement("div");
    box.className = "neusa-toast";
    box.innerHTML = '<span class="icon">🔑</span><span class="msg"></span><button class="close" title="Fechar">✕</button>';
    box.querySelector(".msg").textContent = text;
    box.querySelector(".close").addEventListener("click", () => box.remove());
    document.body.appendChild(box);
    setTimeout(() => box.remove(), 25000);
  }
  function startWellnessTimer(name) {
    setInterval(() => showWellnessReminder(name), 2 * 60 * 60 * 1000);
  }

  async function loadOwnerFilter() {
    const sel = document.getElementById("ownerFilter");
    if (Store.mode !== "remote") { sel.style.display = "none"; return; }
    let users = [];
    try { users = await fetch("/api/users").then(r => r.ok ? r.json() : []); } catch (_) {}
    sel.innerHTML = "";
    const optAll = document.createElement("option");
    optAll.value = "all"; optAll.textContent = "Todos"; sel.appendChild(optAll);
    for (const u of users) {
      const opt = document.createElement("option");
      opt.value = u.username; opt.textContent = u.username; sel.appendChild(opt);
    }
    sel.style.display = "block";
    sel.value = "all";
    sel.addEventListener("change", async () => {
      const rows = await Store.listByOwner(sel.value);
      conversations = rows.map(c => ({ id: c.id, title: c.title, updatedAt: c.updatedAt, data: null, _new: false }));
      renderList();
    });
  }

  async function init() {
    let user = "anon", role = null;
    try {
      const me = await fetch("/api/me").then(r => r.json());
      if (me && me.user) { user = me.user; role = me.role; }
    } catch (_) {}
    document.getElementById("userLabel").textContent = user === "anon" ? "Visitante" : user;
    if (role === "diretor") {
      document.getElementById("adminLink").style.display = "inline-block";
      document.getElementById("videoVariant").style.display = "inline-block";
    }
    conversations = (await Store.init(user)).map(c => ({ id: c.id, title: c.title, updatedAt: c.updatedAt, data: null, _new: false }));
    await loadOwnerFilter();
    document.getElementById("hint").textContent = Store.mode === "remote"
      ? "Histórico compartilhado entre a equipe · consultas ao advisor aparecem em dourado."
      : "Histórico salvo neste computador · consultas ao advisor aparecem em dourado.";
    if (!conversations.length) { newConv(); }
    else { await selectConv(conversations[0].id); }
    input.focus();
    if (user !== "anon") startWellnessTimer(user);
  }

  input.addEventListener("input", autosize);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } });
  sendBtn.addEventListener("click", send);
  document.getElementById("new").addEventListener("click", newConv);
  document.getElementById("logout").addEventListener("click", logout);
  document.getElementById("toggle").addEventListener("click", () => document.body.classList.toggle("collapsed"));
  init();
</script>
</body>
