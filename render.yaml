services:
  - type: web
    name: advisor-chat
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # defina no painel do Render (Secret)
      - key: SYSTEM_PROMPT
        sync: false   # opcional — contexto do Promob, etc.
