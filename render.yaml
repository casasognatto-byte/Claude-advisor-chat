services:
  - type: web
    name: advisor-chat
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # defina no painel do Render (Secret)
      - key: SYSTEM_PROMPT
        sync: false   # opcional — contexto do Promob, etc.
      - key: DATABASE_URL
        sync: false   # Postgres (Neon/Supabase/Render) — necessário para login e conversas
      - key: SEED_DIRETOR_PASSWORD
        sync: false   # senha inicial do diretor (Davi); os demais definem a própria via convite
      - key: EMAIL_BACKEND
        value: console   # trocar para "smtp" quando as credenciais SMTP estiverem configuradas
      - key: EMAIL_FROM
        value: Casa Sognatto <nao-responder@casasognatto.com.br>
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: VIDEO_ENGINE
        value: stub   # trocar para "luma" ou "veo" quando as chaves abaixo estiverem configuradas
      - key: LUMA_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        value: https://chat.casasognatto.com.br
      - key: IMAGE_ENGINE
        value: stub   # trocar para "nanobanana" quando GOOGLE_API_KEY estiver configurada
