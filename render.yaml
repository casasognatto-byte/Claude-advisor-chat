services:
  - type: web
    name: advisor-chat
    runtime: python
    plan: starter   # 08/07/2026: upgrade do free — eliminar o "cold start" (~50s) que
    # aparecia pra quem acessasse depois de 15min sem uso. Manter sincronizado aqui
    # pra evitar que o blueprint reverta pra "free" sozinho num próximo sync/deploy.
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"   # sem isso, os print() de diagnostico (erros de email/clickup/etc.) ficam
        # presos no buffer do Python e nunca aparecem nos logs do Render - achado real
        # investigando por que o "esqueci senha" travava sem erro visivel (2026-07-06)
      - key: SECRET_KEY
        generateValue: true   # 08/07/2026: sem isso, o código caía num valor aleatório
        # gerado a cada boot (ver app/main.py) — cada deploy derrubava a sessão de
        # login de todo mundo. generateValue: true faz o Render gerar um valor uma
        # única vez e mantê-lo fixo entre deploys.
      - key: ANTHROPIC_API_KEY
        sync: false   # defina no painel do Render (Secret)
      - key: SYSTEM_PROMPT
        sync: false   # opcional — contexto do Promob, etc.
      - key: DATABASE_URL
        sync: false   # Postgres (Neon/Supabase/Render) — necessário para login e conversas
      - key: SEED_DIRETOR_PASSWORD
        sync: false   # senha inicial do diretor (Davi); os demais definem a própria via convite
      - key: EMAIL_BACKEND
        value: smtp   # deixe "console" se quiser suspender envios
      - key: EMAIL_FROM
        value: Casa Sognatto <casasognatto@gmail.com>   # 14/07/2026: trocado do naoresponda@ (KingHost) pro Gmail de uso da empresa
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"   # STARTTLS — porta recomendada do Gmail (465/SSL também funciona se preferir)
      - key: SMTP_USER
        value: casasognatto@gmail.com
      - key: SMTP_PASSWORD
        sync: false   # SEGREDO — precisa ser uma "Senha de app" do Gmail (NÃO a senha normal da
        # conta). Gerar em myaccount.google.com/apppasswords (exige verificação em 2 etapas
        # ativada na conta). Cole o valor de 16 caracteres aqui no painel do Render, nunca
        # versionar. Se a verificação em 2 etapas não estiver ativada, ative primeiro — sem
        # ela o Google nem mostra a opção de gerar senha de app.
      - key: PASSWORD_RESET_BCC
        value: casasognatto@gmail.com   # 14/07/2026: pedido do Davi — como diretor, ele precisa
        # conseguir completar a redefinição de senha de qualquer usuário (ex: alguém desligado
        # da empresa) sem depender do e-mail pessoal dessa pessoa. Todo e-mail de "esqueci minha
        # senha" vai em cópia oculta pra essa caixa também (já é o padrão no código mesmo sem
        # essa variável — só deixando explícito/editável aqui).
      - key: GOOGLE_API_KEY
        sync: false   # Nano Banana (geração de imagem), via Gemini API
      - key: PUBLIC_BASE_URL
        value: https://chat.casasognatto.com.br   # usado nos links de convite/redefinição de senha
      - key: IMAGE_ENGINE
        value: nanobanana   # 14/07/2026: GOOGLE_API_KEY já configurada há tempo — deixado em
        # "stub" neste arquivo por engano fazia o valor voltar a cair pra stub sempre que o
        # Render sincronizava as variáveis a partir do blueprint, desfazendo a troca manual
        # feita no painel (achado real: 3 renders de teste da Isabela saíram com um arquivo
        # falso de ~40 bytes em vez de imagem de verdade, mesmo com o job marcado "concluído").
      - key: R2_ACCOUNT_ID
        sync: false   # Biblioteca de Apresentações — Cloudflare R2. Sem isso, cai pra disco local (não persiste)
      - key: R2_ACCESS_KEY_ID
        sync: false   # SEGREDO
      - key: R2_SECRET_ACCESS_KEY
        sync: false   # SEGREDO
      - key: R2_BUCKET
        sync: false
      - key: CLICKUP_TOKEN
        sync: false   # SEGREDO — mesmo token do ZapSignBridge (pk_...); sem isso, alerta só loga
        # Testado de ponta a ponta (2026-07-04): manda DM real pro Davi no ClickUp
        # quando alguém pergunta qual IA está por trás. Padrões no código já
        # cobrem o workspace (90133031055) e o e-mail dele
        # (davinogueira@casasognatto.com.br) — só sobrescreva
        # CLICKUP_WORKSPACE_ID / CLICKUP_ALERT_EMAIL se algo mudar.
